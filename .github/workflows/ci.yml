name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1 : TypeScript + Vitest + Build ───────────────────────────────────
  typecheck-build-test:
    name: TypeScript + Vitest + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Vitest — tests unitaires
        run: npm test

      - name: Build Next.js
        run: npm run build
        env:
          NEXTAUTH_SECRET: ci-nextauth-secret-padding-32chars-ok
          NEXTAUTH_URL: https://portal.perform-learn.fr
          NEXT_PUBLIC_API_URL: https://api.perform-learn.fr
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_placeholder
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          RESEND_API_KEY: re_test_ci_placeholder
          STRIPE_SECRET_KEY: sk_test_ci_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
          CRON_SECRET: ci-cron-secret-placeholder

      - name: Vérification secrets hardcodés
        run: |
          if grep -rn "sk_live_\|re_live_\|whsec_live_\|xai-live" app lib components \
            --include="*.ts" --include="*.tsx" 2>/dev/null; then
            echo "❌ Secret live hardcodé détecté — build bloqué"
            exit 1
          fi
          echo "✅ Aucun secret live dans le code"
        working-directory: portal

  # ── Job 2 : E2E Isolation — Postgres éphémère (sur PR uniquement) ─────────
  e2e-isolation:
    name: E2E Isolation — Postgres éphémère
    needs: typecheck-build-test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: appstore
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/appstore
      NEXTAUTH_SECRET: ci-nextauth-secret-isolation-32chars-ok
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_placeholder
      RESEND_API_KEY: re_test_ci_placeholder
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
      CRON_SECRET: ci-cron-secret-placeholder

    defaults:
      run:
        working-directory: portal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Appliquer les migrations
        run: |
          for sql in $(ls ../migrations/*.sql | sort); do
            echo "→ $sql"
            PGPASSWORD=ci psql -h localhost -U ci -d appstore -f "$sql"
          done

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Next.js
        run: npm run build

      - name: Démarrer Next.js (production)
        run: npm start &

      - name: Attendre que l'app soit prête
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/api/freelancehub/health && echo "" && break
            echo "  Tentative $i/30 — retry dans 2s"
            sleep 2
          done

      - name: Run E2E — auth flows
        run: npx playwright test tests/e2e/auth.spec.ts
        env:
          E2E_BASE_URL: http://localhost:3000

      - name: Run E2E — booking flows
        run: npx playwright test tests/e2e/booking.spec.ts
        env:
          E2E_BASE_URL: http://localhost:3000

      - name: Run E2E — consultant flows
        run: npx playwright test tests/e2e/consultant.spec.ts
        env:
          E2E_BASE_URL: http://localhost:3000

      - name: Upload rapport E2E isolation (si échec)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-isolation-report-${{ github.sha }}
          path: portal/playwright-report/
          retention-days: 7

  # ── Job 3 : Smoke test — attend Vercel + vérifie DB ──────────────────────
  smoke-test:
    name: Smoke test — Vercel + DB health
    needs: typecheck-build-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      deploy-url: ${{ steps.wait-deploy.outputs.deploy-url }}

    steps:
      - name: Attendre déploiement Vercel et vérifier health
        id: wait-deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          SHA="${{ github.sha }}"
          echo "Attente du déploiement Vercel pour commit ${SHA:0:7}..."

          DEPLOY_URL=""
          for i in $(seq 1 24); do
            DEPLOY_INFO=$(curl -sf \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?teamId=$VERCEL_TEAM_ID&projectId=$VERCEL_PROJECT_ID&limit=5" \
              | jq -r --arg sha "$SHA" \
                '.deployments[] | select(.meta.githubCommitSha == $sha) | "\(.state) \(.url)"' \
              | head -1)

            STATE=$(echo "$DEPLOY_INFO" | cut -d' ' -f1)
            URL=$(echo "$DEPLOY_INFO"  | cut -d' ' -f2)

            if [ "$STATE" = "READY" ] && [ -n "$URL" ]; then
              DEPLOY_URL="https://$URL"
              echo "✅ Déploiement READY : $DEPLOY_URL"
              break
            elif [ "$STATE" = "ERROR" ]; then
              echo "❌ Déploiement en erreur sur Vercel"
              exit 1
            fi

            echo "  Tentative $i/24 — état: ${STATE:-en attente} — retry dans 10s"
            sleep 10
          done

          if [ -z "$DEPLOY_URL" ]; then
            echo "❌ Timeout : déploiement non prêt après 4 min"
            exit 1
          fi

          echo "deploy-url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

          # Health check sur le déploiement exact
          echo "Health check sur $DEPLOY_URL/api/freelancehub/health ..."
          HEALTH=$(curl -sf "$DEPLOY_URL/api/freelancehub/health" || echo '{}')
          echo "Réponse : $HEALTH"

          STATUS=$(echo "$HEALTH" | jq -r '.status // "error"')
          DB=$(echo "$HEALTH"     | jq -r '.db // false')

          if [ "$STATUS" != "ok" ] || [ "$DB" != "true" ]; then
            echo "❌ Smoke test KO — status=$STATUS db=$DB"
            exit 1
          fi

          echo "✅ Smoke test OK — DB connectée, schéma freelancehub présent"

  # ── Job 4 : E2E Playwright (uniquement sur push main) ────────────────────
  e2e:
    name: E2E Playwright — flows critiques
    needs: [typecheck-build-test, smoke-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: portal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E — auth flows
        run: npx playwright test tests/e2e/auth.spec.ts
        env:
          E2E_BASE_URL: https://portal.perform-learn.fr

      - name: Run E2E — booking flows
        run: npx playwright test tests/e2e/booking.spec.ts
        env:
          E2E_BASE_URL: https://portal.perform-learn.fr

      - name: Run E2E — consultant flows
        run: npx playwright test tests/e2e/consultant.spec.ts
        env:
          E2E_BASE_URL: https://portal.perform-learn.fr

      - name: Upload rapport E2E (si échec)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: portal/playwright-report/
          retention-days: 7
