name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-build:
    name: TypeScript + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Auth (required at build time by NextAuth)
          NEXTAUTH_SECRET: ci-nextauth-secret-padding-32chars-ok
          NEXTAUTH_URL: https://portal.perform-learn.fr

          # API — lib/api.ts has mock fallbacks when unreachable
          NEXT_PUBLIC_API_URL: https://api.perform-learn.fr

          # Stripe — client-side key embedded at build time
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_placeholder

          # Server-only vars (runtime only, not embedded — set to avoid missing-var warnings)
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          RESEND_API_KEY: re_test_ci_placeholder
          STRIPE_SECRET_KEY: sk_test_ci_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
          CRON_SECRET: ci-cron-secret-placeholder
