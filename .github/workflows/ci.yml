name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1 : TypeScript + Vitest + Build ───────────────────────────────────
  typecheck-build-test:
    name: TypeScript + Vitest + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Vitest — tests unitaires
        run: npm test

      - name: Build Next.js
        run: npm run build
        env:
          NEXTAUTH_SECRET: ci-nextauth-secret-padding-32chars-ok
          NEXTAUTH_URL: https://portal.perform-learn.fr
          NEXT_PUBLIC_API_URL: https://api.perform-learn.fr
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_placeholder
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          RESEND_API_KEY: re_test_ci_placeholder
          STRIPE_SECRET_KEY: sk_test_ci_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
          CRON_SECRET: ci-cron-secret-placeholder

      - name: Vérification secrets hardcodés
        run: |
          if grep -rn "sk_live_\|re_live_\|whsec_live_\|xai-live" app lib components \
            --include="*.ts" --include="*.tsx" 2>/dev/null; then
            echo "❌ Secret live hardcodé détecté — build bloqué"
            exit 1
          fi
          echo "✅ Aucun secret live dans le code"
        working-directory: portal

  # ── Job 2 : E2E Playwright (uniquement sur push main) ────────────────────
  e2e:
    name: E2E Playwright — flows critiques
    needs: typecheck-build-test
    runs-on: ubuntu-latest
    # N'exécuter qu'en push sur main (pas sur les PRs pour éviter d'exposer les secrets)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: portal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Attente déploiement Vercel (2 min)
        run: sleep 120

      - name: Récupérer l'URL preview Vercel
        id: vercel-url
        run: |
          # Tente de récupérer l'URL preview du dernier déploiement via l'API Vercel
          DEPLOYMENT_URL=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            "https://api.vercel.com/v6/deployments?teamId=${{ secrets.VERCEL_TEAM_ID }}&projectId=${{ secrets.VERCEL_PROJECT_ID }}&limit=1" \
            | python3 -c "import sys,json; d=json.load(sys.stdin)['deployments'][0]; print(d.get('url',''))" 2>/dev/null || echo "")

          if [ -n "$DEPLOYMENT_URL" ]; then
            echo "E2E_BASE_URL=https://$DEPLOYMENT_URL" >> $GITHUB_ENV
            echo "  E2E URL : https://$DEPLOYMENT_URL"
          else
            # Fallback : utiliser l'URL de production stable
            echo "E2E_BASE_URL=https://portal.perform-learn.fr" >> $GITHUB_ENV
            echo "  E2E URL (fallback prod) : https://portal.perform-learn.fr"
          fi

      - name: Run E2E — auth flows
        run: npx playwright test tests/e2e/auth.spec.ts
        env:
          E2E_BASE_URL: ${{ env.E2E_BASE_URL }}

      - name: Run E2E — booking flows
        run: npx playwright test tests/e2e/booking.spec.ts
        env:
          E2E_BASE_URL: ${{ env.E2E_BASE_URL }}

      - name: Run E2E — consultant flows
        run: npx playwright test tests/e2e/consultant.spec.ts
        env:
          E2E_BASE_URL: ${{ env.E2E_BASE_URL }}

      - name: Upload rapport E2E (si échec)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: portal/playwright-report/
          retention-days: 7
